replicaCount: 2

image:
  # Полный URI без тега, например: 123456789012.dkr.ecr.us-east-1.amazonaws.com/lesson23-app
  repository: "123456789012.dkr.ecr.us-east-1.amazonaws.com/lesson23-app"
  # Тег обновляет GitHub Actions в remove-app после push в ECR (commit SHA).
  pullPolicy: IfNotPresent
  tag: "2774f78975dcfd2667e39a6d5ef4f492c12dbd6d"

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

podAnnotations: {}

podSecurityContext:
  fsGroup: 1001
  runAsUser: 1001
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3

nodeSelector: {}
tolerations: []
affinity: {}
